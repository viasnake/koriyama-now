name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  VITE_GOOGLE_PSE_CX: ${{ vars.VITE_GOOGLE_PSE_CX }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Size budget
        run: npm run check:size

      - name: Visual, accessibility, and interaction checks
        run: npm run test:e2e

      - name: Lighthouse checks
        run: npm run check:lighthouse
